[fwupd Remote]

# this remote provides metadata and firmware marked as 'embargo' from the LVFS
Enabled=false
Title=Linux Vendor Firmware Service (embargo)
MetadataURI=https://cdn.fwupd.org/downloads/firmware-embargo.xml.@compression@
PrivacyURI=https://lvfs.readthedocs.io/en/latest/privacy.html
ReportURI=https://fwupd.org/lvfs/firmware/report
FirmwareBaseURI=https://fwupd.org/downloads
OrderBefore=lvfs,lvfs-testing
RequiresAuth=true
AutomaticReports=false
ApprovalRequired=false
# ↓ IGNORE ↓ -- put credentials instead in ~/.config/fwupd/remotes.d/lvfs-embargo.conf
#Username=
#Password=
