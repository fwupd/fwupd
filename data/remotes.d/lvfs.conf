[fwupd Remote]

# this remote provides metadata and firmware marked as 'stable' from the LVFS
Enabled=@enabled@
Title=Linux Vendor Firmware Service
MetadataURI=https://cdn.fwupd.org/downloads/firmware.xml.@compression@
ReportURI=https://fwupd.org/lvfs/firmware/report
PrivacyURI=https://lvfs.readthedocs.io/en/latest/privacy.html
FirmwareBaseURI=https://fwupd.org/downloads
AutomaticReports=false
AutomaticSecurityReports=false
ApprovalRequired=false
# Authentication for S3-hosted firmware repositories (not used by LVFS)
#AuthType=s3
#AwsAccessKey=your-access-key
#AwsSecretKey=your-secret-key
#AwsRegion=us-east-1
