name: clang-tidy
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fwupd/fwupd/fwupd-ubuntu-amd64:latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |-
          apt-get update
          apt-get install --yes --no-install-recommends clang-tidy
      - name: configure
        run: |-
          meson setup -Dwerror=true build
      - name: build
        run: |-
          ninja -C build
      - name: clang-tidy
        run: |-
          ninja -C build clang-tidy
