comment: off

coverage:
  range: 40..60
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: auto
        threshold: 1%
        informational: false
ignore:
  - "**/*.h"
  - "**/*-test.c"
  - "**/*-struct.c"
  - "**/*-resources.c"
